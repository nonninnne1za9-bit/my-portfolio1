<!DOCTYPE html>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Prompt', sans-serif;
            /* ใช้พื้นหลังโทนสีเข้ม-น้ำเงิน ให้ความรู้สึกแบบเทคโนโลยี/โปรแกรมเมอร์ */
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .portfolio-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* ทำเป็นรูปวงกลม */
            object-fit: cover;
            border: 4px solid #3b82f6; /* เส้นขอบรูปสีฟ้าไอที */
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .portfolio-card:hover {
            transform: translateY(-5px);
        }
